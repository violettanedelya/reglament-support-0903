<style>
*{margin:0;padding:0;box-sizing:border-box}

.card{background:#fff;border-radius:16px;padding:48px 40px;box-shadow:0 4px 24px rgba(0,0,0,.08);text-align:center;max-width:380px;width:90%}

button:hover{background:#334155}
.error{color:#ef4444;font-size:13px;margin-top:8px;display:none}

function b64(s){return Uint8Array.from(atob(s),c=>c.charCodeAt(0))}
async function decrypt(){
  try{
    const pw=document.getElementById("pw").value;
    const enc=new TextEncoder();
    const km=await crypto.subtle.importKey("raw",enc.encode(pw),"PBKDF2",false,["deriveBits"]);
    const bits=await crypto.subtle.deriveBits({name:"PBKDF2",salt:b64(SALT),iterations:100000,hash:"SHA-256"},km,256);
    const k=await crypto.subtle.importKey("raw",bits,{name:"AES-GCM"},false,["decrypt"]);
    const dec=await crypto.subtle.decrypt({name:"AES-GCM",iv:b64(IV)},k,b64(CT));
    const html=new TextDecoder().decode(dec);
    document.open();document.write(html);document.close();
  }catch(e){document.getElementById("err").style.display="block"}
}
document.getElementById("pw").addEventListener("keydown",e=>{if(e.key==="Enter")decrypt()});
